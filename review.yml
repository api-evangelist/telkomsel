aid: telkomsel
name: Telkomsel
review:
  question: Does Telkomsel expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Every API Telkomsel publishes through
    the DigiHub marketplace is request/response REST over HTTPS - SMS and
    USSD sends, subscriber checks, identity verification, location
    verification, SIM swap checks, consent management, and scoring products
    all use synchronous POST/GET calls. The only asynchronous surface is an
    HTTP webhook - the SMS and USSD send endpoints define an OpenAPI
    callback that POSTs delivery reports to a client-supplied
    callback_domain - alongside client-initiated GET delivery-status polls.
    That callback is already modeled in the OpenAPI document (as OpenAPI
    callbacks), and no WebSocket (ws:// or wss://) or SSE transport is
    documented anywhere in DigiHub's per-endpoint OpenAPI registry, so
    there is no WebSocket surface to model in AsyncAPI.
findings:
  summary: |
    Telkomsel does not publish a documented public WebSocket API. Telkomsel
    is Indonesia's largest mobile network operator, and its developer surface
    is DigiHub (digihub.telkomsel.com), an API marketplace with 13 published
    API products as of the review date - Active Status v3, API Income Score,
    API Interest v2, API IoT KYC, API Location Verification v3, API NIK
    Matching v4, API Recycle v2, API Telco SES, API tScore, IoT Signal
    Strength API, nGage Video, SIM Swap v2, and TDI Tenure Score Category -
    plus SMS, USSD, consent-management, and CIAM/OTP endpoints in its
    per-endpoint OpenAPI registry. All are synchronous HTTPS REST. Most
    authenticate with an api_key header plus an x-signature header computed
    as SHA256(API Key + Secret Key + epoch timestamp); a CAMARA-style SIM
    Swap API (/sim-swap/v0/check) authenticates with OIDC CIBA
    (/bc-authorize + /token) bearer tokens. Telkomsel is a GSMA Open Gateway
    participant (Number Verify, SIM Swap, Device Location launched jointly
    with Indosat Ooredoo Hutchison, XL Axiata, and Smartfren) and partners
    with Vonage to distribute its network APIs. Trying any endpoint requires
    a DigiHub account and a subscribed plan; the DigiHub SPA's content API
    serves the product catalog, consumer-guide documentation, and
    per-endpoint OpenAPI documents publicly without authentication.
  accessModel: |
    Documentation and per-endpoint OpenAPI documents are public (served by
    the DigiHub content API without login), but invocation is gated. Retail
    users can buy a one-time free Sandbox plan and prepaid Quota packages;
    Tier and PAYU (pay-as-you-use) plans are enterprise-only and require a
    signed NDA or commercial contract. Several data products (scoring,
    location, identity) also require a customer consent ID obtained through
    the Consent Management API before a query is allowed. Per-product prices
    are shown in the portal after login and are not published openly.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.digitalcore.telkomsel.com
      documented: true
      note: Primary DigiHub production gateway for SMS, USSD, subscriber check, identity, location, consent, and scoring endpoints.
    - protocol: REST
      scheme: https
      baseURL: https://digihub.telkomsel.com
      documented: true
      note: Secondary host serving some subscriber-check and tScore endpoints, the CIAM/OTP endpoints, and the CAMARA-style /sim-swap/v0 API with /bc-authorize and /token.
    - protocol: HTTP Poll
      scheme: https
      documented: true
      note: SMS delivery status (GET /v1/delivery) and USSD delivery status (GET /digihub/ussd/deliverystatus) are client-initiated polls, not server push.
    - protocol: Webhook
      scheme: https
      documented: true
      note: SMS and USSD send endpoints define an OpenAPI callback POSTing delivery reports to a client-supplied callback_domain. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint appears anywhere in DigiHub's endpoint registry or consumer guide as of the review date.
