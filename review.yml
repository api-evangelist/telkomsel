actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or other server-push transport exists on Telkomsel's public
    API surface - everything DigiHub publishes is synchronous HTTPS REST,
    with delivery status obtained by polling - so no AsyncAPI document was
    created. An OpenAPI document was assembled instead, merged verbatim from
    DigiHub's own public per-endpoint OpenAPI registry.
