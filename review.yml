  - url: https://digihub.telkomsel.com/apis/V2/endpoint/71
    type: OpenAPI
    note: Example of the public per-endpoint OpenAPI registry (Send SMS); IDs 60-200 cover SMS, USSD, subscheck, identity, location, SIM swap, consent, scoring, and CIAM endpoints.
  - url: https://digihub.telkomsel.com/documentation/consumer-guide/api-authentication
    type: Documentation
    note: App key-based authentication - api_key header plus x-signature SHA256(Key + Secret + epoch timestamp).
  - url: https://digihub.telkomsel.com/documentation/consumer-guide/apis
    type: Documentation
    note: Consumer guide covering browsing, endpoints, pricing plans (Sandbox/Quota/Tier/PAYU), retail vs enterprise rules, and NDA/contract requirements.
