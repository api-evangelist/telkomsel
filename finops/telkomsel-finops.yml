meters:
- name: api_calls
  description: API invocations per DigiHub product; deducted from prepaid quota or billed postpaid via CDRs.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - product
  - plan
- name: quota_purchases
  description: Prepaid quota packages purchased per product; stackable within the running month, unused calls expire.
  unit: packages
  aggregation: sum
  dimensions:
  - account
  - product
- name: excess_usage
  description: Enterprise calls beyond the purchased quota for the running month, billed as overage.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - product
- name: sms_messages
  description: A2P SMS submissions (regular and premium) to Telkomsel MSISDNs via the SMS API.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - sender_id
principles:
- name: Visibility
  description: Track per-product call volume against prepaid quota balances and monthly CDR-billed usage; the portal dashboard reports usage and recent orders per application.
- name: Allocation
  description: Register separate DigiHub applications and API keys per team or workload so per-call charges map to internal cost centers.
- name: Optimization
  description: Match plan type to volume - quota packages for predictable retail volume, Tier for high enterprise volume to benefit from step-down rates, PAYU for spiky usage; size quota purchases to the month to avoid forfeiting expired calls.
- name: Accountability
  description: Assign an owner per subscribed product; review monthly invoices and excess-usage charges against contracted rates.
