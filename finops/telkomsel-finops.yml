description: >-
  FinOps view of Telkomsel DigiHub API spend. Every DigiHub API product is
  metered per call. Prepaid spend is quota packages - calls are deducted from
  the purchased quota, packages can be stacked within the running month, and
  unused quota expires with the package validity period. Postpaid spend is
  enterprise Tier and PAYU contracts - each call generates a CDR (call detail
  record) that the carrier invoices monthly, with Tier rates stepping down as
  monthly volume crosses thresholds and PAYU charging a flat per-call fee.
  Sandbox trials are free one-time quotas per product. Pricing is per product
  and displayed in IDR inside the portal after login.
notes: >-
  Per-unit IDR rates are not published openly and are not reconciled here.
  Enterprise plans require signed NDA or commercial contract, so negotiated
  rates may differ from portal list prices. Watch expiring prepaid quota -
  unused calls are forfeited at the end of the package validity period.
