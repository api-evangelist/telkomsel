  /check:
    post:
      tags:
      - SIM Swap
      description: Check if SIM swap has been performed during a past period
      operationId: checkSimSwap
      parameters:
      - in: header
        name: X-Authorization
        example: '[X-token]'
        description: Bearer X-token
        required: true
        schema:
          type: string
      requestBody:
        description: 'Create a check SIM swap request for a MSISDN identifier.

          '
        content:
          application/json:
            schema:
              type: object
              required:
              - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  pattern: ^\+?[0-9]{5,15}$
                  example: '+346661113334'
                  description: Subscriber number in E.164 format (starting with country code). Optionally
                    prefixed with '+'.
                maxAge:
                  type: integer
                  example: 240
                  description: 'Period in hours to be checked for SIM swap.

                    '
                  format: int32
                  minimum: 1
                  maximum: 2400
                  default: 240
        required: true
      responses:
        '200':
          description: Returns whether a SIM swap has been performed during a past period
          content:
            application/json:
              schema:
                type: object
                properties:
                  swapped:
                    type: boolean
                    description: Indicates whether the SIM card has been swapped during the period within
                      the provided age.
        '400':
          description: Problem with the client request
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - code
                - message
                properties:
                  status:
                    type: integer
                    description: HTTP response status code
                  code:
                    type: string
                    description: Code given to this error
                  message:
                    type: string
                    description: Detailed error description
              example:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param
        '401':
          description: Authentication problem with the client request
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - code
                - message
                properties:
                  status:
                    type: integer
                    description: HTTP response status code
                  code:
                    type: string
                    description: Code given to this error
                  message:
                    type: string
                    description: Detailed error description
              example:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials
        '403':
          description: Client does not have sufficient permission
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - code
                - message
                properties:
                  status:
