  /digihub/subscheck/recyclev2:
    post:
      summary: Recycle v2
      operationId: Recycle-v2
      description: This API will allow user to know if a MSISDN has been recycled or not by comparing
        a user’s last activation/registered time with last deactivation time in Telkomsel’s system.
      parameters:
      - in: header
        name: api_key
        example: '[api_key]'
        description: API Key / Package Key from Digihub
        required: true
        schema:
          type: string
      - in: header
        name: x-signature
        example: '[x-signature]'
        description: SHA256 (API Key + Secret Key + timeStamp). [More info](https://digihub.telkomsel.com/documentation/consumer-guide/api-key-api-secret)
        required: true
        schema:
          type: string
      - in: header
        name: Content-Type
        required: true
        schema:
          type: string
          enum:
          - application/json
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - transaction
              - parameter
              properties:
                transaction:
                  type: object
                  properties:
                    transaction_id:
                      description: Transaction ID
                      type: string
                      example: '1643624695_00000001'
                    consent_id:
                      description: Customer consent id
                      type: string
                      example: consent_01
                    msisdn:
                      description: MSISDN starts with “62” for Indonesia calling code
                      type: string
                      example: '628111334960'
                parameter:
                  type: object
                  properties:
                    timestamp:
                      description: Timestamp with “yyyy-mm-dd” format and not greater than current date
                      type: string
                      example: '2021-01-01'
                    channel:
                      description: Channel name, for external TSEL please use “marketplace” as the value
                      type: string
                      example: partner_01
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                - transaction_id
                - status_code
                - status_desc
                - result
                properties:
                  transaction_id:
                    description: Transaction ID.
                    type: string
                    example: '1643624695_00000187'
                  status_code:
                    description: Status Code
                    type: string
                    example: '00000'
                  status_desc:
                    description: Status Description
                    type: string
                    example: Success
                  result:
                    description: Result of whether msisdn is recycled or not.
                    type: string
                    example: 'NO'
        '400':
          description: Empty Mandatory Parameter / Invalid MSISDN / Invalid Timestamp
          content:
            application/json:
              schema:
                type: object
                required:
                - transaction_id
                - status_code
                - status_desc
                properties:
                  transaction_id:
                    description: Transaction ID
                    type: string
                    example: C002190726165745657448250
                  status_code:
                    description: Status Code
                    type: string
                    example: '20101'
                  status_desc:
                    description: Status Description
                    type: string
                    example: Invalid Timestamp
              examples:
                Empty Mandatory Parameter:
                  value:
                    transaction_id: C002190726165745657448250
                    status_code: '20001'
                    status_desc: Empty mandatory parameter
                Invalid MSISDN:
                  value:
                    transaction_id: C002190726165745657448250
                    status_code: '20002'
                    status_desc: INVALID MSISDN
                Invalid Timestamp:
                  value:
                    transaction_id: C002190726165745657448250
                    status_code: '20101'
                    status_desc: Invalid Timestamp
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                type: object
                required:
                - transaction_id
                - status_code
                - status_desc
                properties:
                  transaction_id:
                    description: Transaction ID
                    type: string
                    example: C002190726165745657448250
                  status_code:
                    description: Status Code
                    type: string
                    example: '20101'
                  status_desc:
                    description: Status Description
                    type: string
                    example: Invalid Timestamp
              example:
                transaction_id: C002190726165745657448250
                status_code: '40000'
                status_desc: ESB Internal Error
        '502':
          description: Backend Internal Error
          content:
            application/json:
              schema:
                type: object
                required:
                - transaction_id
                - status_code
                - status_desc
                properties:
                  transaction_id:
                    description: Transaction ID
