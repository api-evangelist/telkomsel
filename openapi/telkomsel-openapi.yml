  /v1/delivery:
    get:
      summary: Get Delivery Status
      operationId: getDeliveryStatus
      description: This service as a module to get delivery status which are initiated by developer /
        partner.
      parameters:
      - in: header
        name: api_key
        example: e688u2hgpkzjd244wecywwv8
        description: API Key / Package Key from Digihub
        required: true
        schema:
          type: string
      - in: header
        name: x-signature
        example: ff080f3200a5945deeb59ad65e2b33788f5df49066a82afcf8b6d5bf43ff76ea
        description: SHA256 (API Key + Secret Key + timeStamp). [More info](https://digihub.telkomsel.com/documentation/consumer-guide/api-authentication)
        required: true
        schema:
          type: string
      - in: header
        name: Content-Type
        required: true
        schema:
          type: string
          enum:
          - application/json
      - in: query
        name: transaction_id
        required: true
        description: Transaction ID
        schema:
          type: string
          example: C002190926121907251312345
      - in: query
        name: message_id
        required: true
        description: Message ID
        schema:
          type: string
          example: 22D40100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                - transaction
                - sms_information
                properties:
                  transaction:
                    type: object
                    required:
                    - transaction_id
                    - status_code
                    - status_desc
                    properties:
                      transaction_id:
                        type: string
                        description: Transaction ID
                        example: C002190726165745657448250
                      status_code:
                        type: string
                        description: Status code
                        example: '00000'
                      status_desc:
                        type: string
                        description: Status description
                        example: Success
                  sms_information:
                    type: object
                    required:
                    - transaction_id
                    - message_id
                    - sender_id
                    - recipient
                    - status
                    properties:
                      transaction_id:
                        description: Transaction ID
                        type: string
                        example: C002190926121907251348411
                      message_id:
                        description: SMS Message ID
                        type: string
                        example: 22D40100
                      sender_id:
                        description: SMS Sender ID
                        type: string
                        example: YOURCOMPANY
                      recipient:
                        description: Telkomsel MSISDN
                        type: string
                        example: 62811xx
                      status:
                        description: Status of SMS delivery
