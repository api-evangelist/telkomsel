name: Telkomsel
kind: company
description: Telkomsel (PT Telekomunikasi Selular) is Indonesia's largest mobile
  network operator. Through DigiHub (digihub.telkomsel.com), its API marketplace,
  Telkomsel exposes network and subscriber APIs to developers and enterprises -
  A2P SMS and USSD messaging, subscriber status checks, identity verification
  (NIK/KTP matching), location verification, SIM swap detection (including a
  CAMARA-style API), consent management, and telco-data scoring products.
  Telkomsel is a GSMA Open Gateway participant, launching Number Verify, SIM
  Swap, and Device Location network APIs alongside the other Indonesian
  carriers, and partners with Vonage to distribute its network APIs globally.
  Access requires a DigiHub account; plans range from free sandbox trials and
  prepaid quota packages to enterprise tier and pay-as-you-use contracts.
